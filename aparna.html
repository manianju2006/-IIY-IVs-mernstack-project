<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aparna Canteen | Quick Byte</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body data-page="legacy-menu">

<header class="topbar">
  <div class="brand">Quick Byte</div>
  <nav class="top-links">
    <a href="canteens.html">Back to Canteens</a>
    <a href="cart.html">Cart <span id="cartCount" class="count-pill">0</span></a>
    <a href="account.html">Account</a>
  </nav>
</header>

<main class="page-shell content-layout">
  <section class="menu-panel">
    <div class="section-head">
      <div>
        <p class="eyebrow">Aparna Canteen</p>
        <h1>Fast favorites, polished layout.</h1>
        <p class="section-copy">This standalone page now matches the refreshed Quick Byte look and feel.</p>
      </div>
      <a class="ghost-button" href="canteens.html">Open Main Menu</a>
    </div>

    <div class="menu-grid">
      <article class="menu-card">
        <img src="noodles.jpg" alt="Noodles">
        <div class="menu-card-content">
          <h3>Noodles</h3>
          <p>Rs. 80</p>
          <button onclick="addCart('Noodles',80)">Add to Cart</button>
        </div>
      </article>
      <article class="menu-card">
        <img src="burger.jpg" alt="Burger">
        <div class="menu-card-content">
          <h3>Burger</h3>
          <p>Rs. 70</p>
          <button onclick="addCart('Burger',70)">Add to Cart</button>
        </div>
      </article>
    </div>
  </section>
</main>

<nav class="bottom-nav">
  <a href="canteens.html">Menu</a>
  <a href="cart.html">Cart</a>
  <a href="account.html">Account</a>
</nav>

<div id="toast" class="toast"></div>

<script src="script.js"></script>

</body>
</html>
